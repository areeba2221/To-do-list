<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>TO DO LIST (Community)</title>
  
      <link href='https://fonts.googleapis.com/css?family=Baloo Bhaina' rel='stylesheet'>
     <link href='https://fonts.googleapis.com/css?family=Baloo' rel='stylesheet'>
     <link href='https://fonts.googleapis.com/css?family=Baloo Tammudu 2' rel='stylesheet'>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body >

  <section>

<div class="relative min-h-screen w-full overflow-hidden">

  <video  autoplay muted loop 
    class="fixed right-0 bottom-0 min-w-full min-h-full object-cover z-0">
    <source src="video/Chillhop - White Oak.mp4" type="video/mp4">
  </video>

  <div class="relative flex justify-center pt-[58px] ">
    <div class=" w-[436px] h-[93px] rounded-[85px] bg-[#D9D9D980] border-[1px] border-[#FFFFFFB2]">
      <h1 class="flex items-center justify-center py-4 bg-clip-text text-transparent bg-gradient-to-r from-[#C4564D] to-[#864B49] text-[64px] font-normal
      leading-[100%] mx-auto font-[Baloo]  text-center">
            To-Do List
      </h1>
    </div>
  </div>

    
  <div class="relative flex items-center pt-[44px] mx-auto px-5 max-w-[1144px] w-full">
    <input type="text" id="taskInput" placeholder="Enter Task" class="w-[614px] h-[65px] rounded-[7px] text-[#FFFFFF] text-left
    text-2xl font-[Baloo] outline-none focus:outline-none border-[1px] bg-[#C4BABA5E] border-[#FFFFFFB2] ml-[180px] pl-4">
    <button onclick="addTask()" class="w-[90px] rounded-full border-[1px] bg-[#C4BABA5E] border-[#FFFFFFB2] ml-[20px]"> 
      <img src="images/add sign.png">
    </button>
  

      <select id="filterSelect"
       class="relative focus:outline-none appearance-none font-[Baloo] text-white ml-[80px] 
       w-[250px] h-[62px] font-[400] font-normal text-[24px] leading-[100%] tracking-0 
        rounded-xl shadow-xl border-[1px] bg-[#C4BABA5E] border-[#FFFFFFB2] pl-[25px]">
       
        <option class="all bg-black text-white" value="all">ALL</option>
        <option class="complete bg-black text-white" value="complete">Completed</option>
        <option class="incomplete bg-black text-white" value="incomplete">Incomplete</option>
      </select>

 
</div>

  <div class="relative flex justify-center mb-4">

      <ul id="taskList" class="mt-[70px] wrap-break-word h-[calc(100vh-360px)] overflow-x-hidden flex flex-col items-start px-5 pb-[20px]"></ul>
 
  </div>
  </div>

   
  </div>

    </section>

    <script src="script.js"></script>

</body>
</html>
